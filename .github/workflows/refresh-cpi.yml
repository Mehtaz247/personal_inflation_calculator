name: Refresh CPI snapshot

on:
  schedule:
    # 06:00 UTC on the 15th of every month. MoSPI typically publishes the
    # previous month's CPI around the 12th, so the 15th gives a 3-day buffer.
    - cron: "0 6 15 * *"
  workflow_dispatch:
    inputs:
      as_of:
        description: "Anchor month (YYYY-MM). Leave blank to auto-detect."
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Refresh snapshot
        id: refresh
        env:
          MOSPI_API_KEY: ${{ secrets.MOSPI_API_KEY }}
        run: |
          if [ -n "${{ inputs.as_of }}" ]; then
            npx tsx scripts/refresh-cpi.ts --as-of "${{ inputs.as_of }}" --log-raw
          else
            npx tsx scripts/refresh-cpi.ts --log-raw
          fi

      - name: Run tests against new snapshot
        run: npm test

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- data/cpi/cpi-combined-2024.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "cpi-refresh-bot"
          git config user.email "cpi-refresh-bot@users.noreply.github.com"
          AS_OF=$(jq -r .as_of_month data/cpi/cpi-combined-2024.json)
          git add data/cpi/cpi-combined-2024.json
          git commit -m "chore(cpi): refresh snapshot to ${AS_OF}"
          git push

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `CPI refresh failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `The monthly CPI refresh workflow failed.`,
              ``,
              `**Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              ``,
              `Likely causes:`,
              `- MoSPI API endpoint or response shape changed`,
              `- Auth requirement changed (set the \`MOSPI_API_KEY\` secret)`,
              `- The expected month hasn't been published yet`,
              ``,
              `Fix path: download the raw response (\`tmp/mospi-raw/\`) from the run artifacts, ` +
              `update field-name candidates in \`lib/cpi/transform.ts\`, and re-run the workflow ` +
              `from the Actions tab.`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["cpi-refresh", "automation"],
            });

      - name: Upload raw responses (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mospi-raw
          path: tmp/mospi-raw/
          if-no-files-found: ignore
